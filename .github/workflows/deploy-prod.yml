name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ ! -f src/worker.js ]; then
            echo "::warning::src/worker.js not found — skipping deploy (main branch not ready yet)"
            exit 0
          fi
          npm install -g wrangler
          wrangler deploy

      - name: Configure custom domain (if needed)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DOMAIN="${{ github.event.repository.name }}"
          WORKER_NAME=$(echo "${DOMAIN}" | tr '.' '-')

          # Check if custom domain is already configured
          EXISTING=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r ".result[] | select(.hostname == \"${DOMAIN}\") | .hostname")

          if [ "${EXISTING}" = "${DOMAIN}" ]; then
            echo "Custom domain ${DOMAIN} already configured"
            exit 0
          fi

          # Look up the zone
          ZONE_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r '.result[0].id // empty')

          if [ -z "${ZONE_ID}" ]; then
            echo "::warning::Zone for ${DOMAIN} not found on Cloudflare — add the domain first"
            exit 0
          fi

          # Attach custom domain to Worker
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"zone_id\": \"${ZONE_ID}\",
              \"hostname\": \"${DOMAIN}\",
              \"service\": \"${WORKER_NAME}\",
              \"environment\": \"production\"
            }" | jq .

          echo "Custom domain ${DOMAIN} attached to Worker ${WORKER_NAME}"
